name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test:
    name: build · test · lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Clippy — mcp feature (deny warnings)
        run: cargo clippy --all-targets --features mcp -- -D warnings

      - name: Clippy — simd feature (deny warnings)
        run: cargo clippy --all-targets --features simd -- -D warnings

      - name: Tests (release)
        run: cargo test --release

      - name: Tests — mcp feature (release)
        run: cargo test --release --features mcp

      - name: Tests — simd feature (release)
        run: cargo test --release --features simd

      - name: Install Mesa lavapipe (software Vulkan, for the gpu feature)
        run: |
          sudo apt-get update
          sudo apt-get install -y mesa-vulkan-drivers vulkan-tools

      - name: Clippy — gpu feature (deny warnings)
        run: cargo clippy --all-targets --features gpu -- -D warnings

      - name: Tests — gpu feature (release, exercises the wgpu path on lavapipe)
        run: cargo test --release --features gpu

      - name: Benchmark smoke run
        run: cargo run --release --example benchmark -- 4000 64 8 200 10
