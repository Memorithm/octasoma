[package]
name = "octasoma"
version = "0.4.0"
edition = "2024"
description = "3D fractal semantic memory engine: learned PCA/JL projection, bucket PR-octree, exact 3-D k-NN, and LZ4-compressed persistence — 100% safe, stable Rust"
license = "MIT"
readme = "README.md"
repository = "https://github.com/checkupauto/octasoma"
keywords = ["octree", "semantic-memory", "knn", "pca", "embeddings"]
categories = ["data-structures", "science", "algorithms"]

[lib]
name = "octasoma"

[dependencies]
# The only runtime dependency: a fast, pure-Rust LZ4 codec for payload persistence.
# The agent layer and the HTTP (Ollama) embedder use the standard library only.
lz4_flex = "0.11"

[profile.release]
lto = true
codegen-units = 1
opt-level = 3
